<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/MyWeatherWx.png" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/MyWeatherWx.png">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MyWeatherWX App</title>
  <meta content="#242424" data-react-helmet="true" name="theme-color" />
</head>

<body>
  <div id="map"></div>

  <!-- Location Button -->
  <button id="location-btn" class="glass-panel location-btn" title="Show My Location">
    <i class="bi bi-crosshair"></i>
  </button>

  <!-- About/Info Panel -->
  <div class="about-panel glass-panel">
    <div class="about-header">
      <div style="display: flex; align-items: center; gap: 12px;">
        <i class="bi bi-cloud-lightning-rain-fill logo-icon"></i>
        <div>
          <h1>MyWeatherWX</h1>
          <span class="version">v0.1 Beta</span>
        </div>
      </div>
      <button class="icon-btn" id="about-toggle">
        <i class="bi bi-chevron-up"></i>
      </button>
    </div>

    <div class="about-content">
      <p class="app-desc">High-precision weather radar & warning system for Malaysia.</p>

      <div class="source-section">
        <label>Data Sources</label>
        <div class="source-tags">
          <a href="https://www.met.gov.my/" class="source-tag">MetMalaysia</a>
          <a href="https://www.rainviewer.com/" class="source-tag">RainViewer</a>
          <a href="https://github.com/mptwaktusolat/jakim.geojson/" class="source-tag">MapData</a>
        </div>
      </div>

      <div class="disclaimer-box">
        <i class="bi bi-exclamation-triangle-fill warning-icon"></i>
        <p><strong>Disclaimer:</strong> Not an official service. Data comes from third-party open data and may be
          inaccurate or delayed. Do not use for safety-critical purposes.</p>
      </div>
      <p class="developer">Developed by <a href="https://www.kerserver.org">Ker</a>.</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
